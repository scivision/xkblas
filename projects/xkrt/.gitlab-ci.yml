.build_template:
  stage: test
  script:
    - cd "$CI_PROJECT_DIR/projects/xkrt/"
    - mkdir build && cd build
    - CC=clang CXX=clang++ cmake -DCMAKE_BUILD_TYPE=$BUILD_TYPE $OPTIONS ..
    - make -j
    - make test
    - cd "$CI_PROJECT_DIR"
  artifacts:
    paths:
      - build


.build_template:
  stage: test
  script:
    - cd "$CI_PROJECT_DIR/projects/xkrt/"
    - mkdir build && cd build
    - cmake -DCMAKE_BUILD_TYPE=$BUILD_TYPE $OPTIONS ..
    - make -j
    - make test
    - cd "$CI_PROJECT_DIR"
  artifacts:
    paths:
      - build

build-release:
  extends: .build_template
  variables:
    BUILD_TYPE: "Release"

build-debug:
  extends: .build_template
  variables:
    BUILD_TYPE: "Debug"

build-release-stats:
  extends: .build_template
  variables:
    BUILD_TYPE: "Release"
    OPTIONS: "-DUSE_STATS=on"

build-debug-stats:
  extends: .build_template
  variables:
    BUILD_TYPE: "Debug"
    OPTIONS: "-DUSE_STATS=on"

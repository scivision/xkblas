# inspired from https://gitlab.inria.fr/gitlabci_gallery/pipelines/complete_cpp_example/-/blob/main/.gitlab-ci.yml?ref_type=heads

stages:
  - build
  - test

variables:
    IMAGE_NAME: "$CI_REGISTRY_IMAGE:latest"

# defaults for linux docker jobs
default:
  interruptible: true
  image: $IMAGE_NAME
  tags:
    - ci.inria.fr
    - large
    - linux
    - v2025

# build the docker image used for tests
docker_buildenv:
  stage: build
  image: docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --cache-from="$IMAGE_NAME" -t $IMAGE_NAME -f .gitlab/Dockerfile .
    - docker push $IMAGE_NAME

include:
  - local: 'projects/xkrt/.gitlab-ci.yml'
  # - local: 'projects/xkblas/.gitlab-ci.yml'
  # - local: 'projects/xkbm/.gitlab-ci.yml'
